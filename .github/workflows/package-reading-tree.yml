name: Attach reading-tree.zip to release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  attach-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Build reading-tree.zip
        run: git archive --format=zip --output=reading-tree.zip --prefix=reading-tree/ HEAD:reading-tree

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" reading-tree.zip --clobber
